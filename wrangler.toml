# 可提交的基础 Wrangler 配置。
# 本地开发请使用未提交的 wrangler.local.toml，并通过 --config 显式指定。
name = "video-summary"
main = "src/worker.js"
compatibility_date = "2024-11-01"

[vars]
# Deploy to Cloudflare 按钮会从这里读取非敏感变量 key，并在部署页面中展示。
LLM_PROVIDER = "auto"
SUMMARY_EXPIRATION_DAYS = "30"
GEMINI_MODEL = ""
GEMINI_BASE_URL = ""
OPENAI_BASE_URL = ""
OPENAI_MODEL = ""
